<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>4dgs — faithful splat viewer (mkkellogg)</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#eee}
  #msg{position:fixed;top:8px;left:8px;right:8px;z-index:10;font-size:13px;background:rgba(0,0,0,.55);padding:8px;border-radius:6px;white-space:pre-wrap}
  #err{color:#f77}
  a{color:#7ad}
</style>
</head>
<body>
<div id="msg"><b>faithful splat viewer</b> — real anisotropic + depth-sorted 3DGS (mkkellogg). Drag to orbit.
<div id="err"></div></div>
<script type="module">
const errEl = document.getElementById('err');
const msgEl = document.getElementById('msg');
function show(m){ msgEl.firstChild.textContent = m; }
try {
  const GS = await import('https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7');
  show('loading renderer…');
  const viewer = new GS.Viewer({
    cameraUp: [0, -1, 0],                 // 3DGS is typically Y-down
    initialCameraPosition: [0, 0, -3.5],
    initialCameraLookAt: [0, 0, 0],
    sphericalHarmonicsDegree: 0,          // TRELLIS output is SH degree 0 (DC color only)
    sharedMemoryForWorkers: false,        // no COOP/COEP headers set -> avoid SharedArrayBuffer requirement
  });
  const url = new URLSearchParams(location.search).get('asset') || 'assets/robot_crab_200k.ply';
  show('loading ' + url + ' …');
  await viewer.addSplatScene(url, { splatAlphaRemovalThreshold: 5, showLoadingUI: true, progressiveLoad: false });
  viewer.start();
  show('rendering ' + url + '  — drag to orbit, scroll/pinch to zoom.  (swap with ?asset=assets/Shu2Edited.ply)');
} catch (e) {
  console.error(e);
  errEl.textContent = 'ERROR: ' + (e && e.message ? e.message : e) + '\n(paste this back to fix)';
}
</script>
</body>
</html>
