<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>4dgs — splat / mesh / bones viewer</title>
<style>
  html,body{margin:0;height:100%;background:#0b0b10;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#eee}
  #ui{position:fixed;top:8px;left:8px;right:8px;z-index:10;font-size:13px;background:rgba(0,0,0,.55);padding:8px;border-radius:8px;backdrop-filter:blur(4px)}
  .row{display:flex;flex-wrap:wrap;gap:6px;margin:5px 0;align-items:center}
  .lbl{opacity:.6;margin-right:2px}
  button{background:#223;color:#cde;border:1px solid #456;border-radius:6px;padding:6px 10px;font-size:13px}
  button.on{background:#2a6;color:#001;border-color:#2a6}
  button.subj.on{background:#48f;color:#001;border-color:#48f}
  #err{color:#f77;white-space:pre-wrap}
  #info{color:#9ad}
</style>
</head>
<body>
<div id="ui">
  <div><b>splat / mesh / bones viewer</b> — pipeline output per subject (image → TRELLIS → clean → UniRig rig).</div>
  <div class="row"><span class="lbl">subject:</span>
    <button id="sCrab" class="subj">Crab (1 bone — pre-cleanup bug)</button>
    <button id="sHuman" class="subj on">Human (28 bones)</button>
    <button id="sButterfly" class="subj">Butterfly (42 bones)</button>
  </div>
  <div class="row"><span class="lbl">show:</span>
    <button id="tSplat" class="on">Splat: ON</button>
    <button id="tMesh" class="on">Mesh: ON</button>
    <button id="tBones" class="on">Bones: ON</button>
    <button id="tLayout">Layout: Combined</button>
  </div>
  <div id="info">loading…</div>
  <div id="err"></div>
</div>
<script type="module">
const info = document.getElementById('info'), errEl = document.getElementById('err');
const fail = m => { errEl.textContent += m + "\n"; console.error(m); };
let THREE, GLTFLoader, OrbitControls;
try {
  THREE = await import('https://esm.sh/three@0.160.0');
  ({ GLTFLoader } = await import('https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js'));
  ({ OrbitControls } = await import('https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js'));
} catch (e) { fail('failed to load three.js: ' + e.message); throw e; }

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b10);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 0, 4);
const controls = new OrbitControls(camera, renderer.domElement);
scene.add(new THREE.HemisphereLight(0xffffff, 0x333344, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1.5); dir.position.set(2, 3, 2); scene.add(dir);
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// each subject = a rigged GLB (mesh + armature) produced by our pipeline + its splat .ply
const SUBJECTS = {
  crab:      { label: 'Crab',      glb: 'assets/crab_rigged.glb',      splat: 'assets/robot_crab_200k.ply' },
  human:     { label: 'Human',     glb: 'assets/human_rigged.glb',     splat: 'assets/human_200k.ply' },
  butterfly: { label: 'Butterfly', glb: 'assets/butterfly_rigged.glb', splat: 'assets/butterfly_184k.ply' },
};
let current = 'human';
const show = { splat: true, mesh: true, bones: true };
let layoutSideBySide = false;
let groups = { splat: null, mesh: null, bones: null };   // active subject's three groups

// TRELLIS emits its SPLAT (gaussians) Y-up but its MESH Z-up, and the rig pipeline keeps
// the mesh's frame -> the GLB (mesh + bones) is Z-up. Rotate GLB-derived groups -90° about
// X so they stand upright (Y-up), matching the splat. (Human/butterfly are bilaterally
// symmetric, so any residual left/right mirror between the two TRELLIS frames is invisible.)
const GLB_ROT_X = -Math.PI / 2;

// wrap content with an EXPLICIT center/scale/rotation (so several groups can share one
// normalization and stay registered to each other — e.g. skeleton sitting inside its mesh).
function wrapFixed(obj, center, scale, rotX = 0) {
  const inner = new THREE.Group(); inner.add(obj);
  obj.position.sub(center); inner.scale.setScalar(scale); inner.rotation.x = rotX;
  const wrap = new THREE.Group(); wrap.add(inner);
  return wrap;
}

// normalize a standalone object to unit size centered at origin.
function normalizedWrap(obj, rotX = 0) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const s = 1.6 / Math.max(size.x, size.y, size.z || 1e-3);
  return wrapFixed(obj, center, s, rotX);
}

function applyLayout() {
  const slot = { splat: -1.6, mesh: 0, bones: 1.6 };
  for (const k of ['splat', 'mesh', 'bones']) if (groups[k]) groups[k].position.x = layoutSideBySide ? slot[k] : 0;
}
function applyVisibility() {
  for (const k of ['splat', 'mesh', 'bones']) if (groups[k]) groups[k].visible = show[k];
}

// Bones-only group: SkeletonHelper lines (bone->child segments) PLUS a sphere at every
// joint. The spheres are the key fix — a single childless/zero-length bone produces ZERO
// helper segments (why the 1-bone crab showed nothing), but a joint sphere is always visible.
function buildBonesGroup(gltfScene) {
  const boneRoot = gltfScene.clone(true);
  boneRoot.traverse(o => { if (o.isMesh || o.isSkinnedMesh) o.visible = false; });
  const helper = new THREE.SkeletonHelper(boneRoot);
  helper.material.linewidth = 3; helper.material.depthTest = false;
  const bg = new THREE.Group(); bg.add(boneRoot); bg.add(helper);
  boneRoot.updateMatrixWorld(true);
  const bones = []; boneRoot.traverse(o => { if (o.isBone) bones.push(o); });
  const ext = Math.max(new THREE.Box3().setFromObject(boneRoot).getSize(new THREE.Vector3()).length(), 1e-3);
  const geo = new THREE.SphereGeometry(Math.max(ext * 0.012, 1e-3), 10, 10);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffcc33, depthTest: false });
  const inst = new THREE.InstancedMesh(geo, mat, Math.max(bones.length, 1));
  const m = new THREE.Matrix4(), p = new THREE.Vector3();
  bones.forEach((b, i) => { b.getWorldPosition(p); inst.setMatrixAt(i, m.makeTranslation(p.x, p.y, p.z)); });
  inst.instanceMatrix.needsUpdate = true; inst.renderOrder = 999;
  bg.add(inst);
  bg.userData.nBones = bones.length;
  return bg;
}

function disposeGroup(g) {
  if (!g) return;
  scene.remove(g);
  g.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(mt => mt.dispose()); });
}

// ---- splat .ply -> colored points ----
const SH_C0 = 0.28209479177387814;
async function loadSplatPoints(url) {
  const buf = await (await fetch(url)).arrayBuffer();
  const bytes = new Uint8Array(buf);
  const needle = 'end_header\n'; let he = -1;
  for (let i = 0; i < bytes.length - needle.length; i++) { let ok = true; for (let j = 0; j < needle.length; j++) if (bytes[i + j] !== needle.charCodeAt(j)) { ok = false; break; } if (ok) { he = i + needle.length; break; } }
  const header = new TextDecoder().decode(bytes.subarray(0, he));
  const le = header.includes('binary_little_endian');
  const TS = { float: 4, float32: 4, uchar: 1, uint8: 1, double: 8, int: 4, uint: 4, short: 2, ushort: 2 };
  let count = 0, props = [], off = 0;
  for (const line of header.split('\n')) { const t = line.trim().split(/\s+/); if (t[0] === 'element' && t[1] === 'vertex') count = +t[2]; else if (t[0] === 'property') { props.push({ name: t[2], type: t[1], off }); off += TS[t[1]] || 4; } }
  const stride = off, dv = new DataView(buf), pm = {}; props.forEach(p => pm[p.name] = p);
  const pos = new Float32Array(count * 3), col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) { const b = he + i * stride;
    pos[i*3] = dv.getFloat32(b + pm.x.off, le); pos[i*3+1] = dv.getFloat32(b + pm.y.off, le); pos[i*3+2] = dv.getFloat32(b + pm.z.off, le);
    let r, g, bl;
    if (pm.f_dc_0) { r = .5 + SH_C0 * dv.getFloat32(b + pm.f_dc_0.off, le); g = .5 + SH_C0 * dv.getFloat32(b + pm.f_dc_1.off, le); bl = .5 + SH_C0 * dv.getFloat32(b + pm.f_dc_2.off, le); }
    else if (pm.red) { r = dv.getUint8(b + pm.red.off)/255; g = dv.getUint8(b + pm.green.off)/255; bl = dv.getUint8(b + pm.blue.off)/255; }
    else r = g = bl = .7;
    col[i*3] = Math.min(1, Math.max(0, r)); col[i*3+1] = Math.min(1, Math.max(0, g)); col[i*3+2] = Math.min(1, Math.max(0, bl));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.01, vertexColors: true, sizeAttenuation: true }));
}

let nBones = 0, splatCount = 0, loadToken = 0;
async function loadSubject(key) {
  current = key;
  const tok = ++loadToken;                 // guard against overlapping loads
  for (const k of ['splat', 'mesh', 'bones']) { disposeGroup(groups[k]); groups[k] = null; }
  nBones = 0; splatCount = 0; updateInfo();
  const S = SUBJECTS[key];

  // GLB -> mesh + bones
  new GLTFLoader().load(S.glb, (gltf) => {
    if (tok !== loadToken) return;
    gltf.scene.updateMatrixWorld(true);
    // MESH: bake the skinned mesh's REST geometry into a plain, NON-skinned mesh. Cloning a
    // SkinnedMesh breaks its skeleton binding, so the skinning shader explodes the vertices
    // into a noise blob. We only want the static rest shape -> drop skinning entirely.
    let src = null;
    gltf.scene.traverse(o => { if (o.isMesh || o.isSkinnedMesh) src = o; });
    // ONE normalization from the mesh, reused for bones so the skeleton sits inside the mesh.
    let center = new THREE.Vector3(), scale = 1;
    if (src) {
      const geo = src.geometry.clone();
      geo.applyMatrix4(src.matrixWorld);          // bake node transform into vertices
      geo.computeVertexNormals();
      geo.computeBoundingBox();
      const size = new THREE.Vector3(); geo.boundingBox.getSize(size); geo.boundingBox.getCenter(center);
      scale = 1.6 / Math.max(size.x, size.y, size.z || 1e-3);
      const plain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x9aa6b2, roughness: 0.8, metalness: 0.0 }));
      groups.mesh = wrapFixed(plain, center, scale, GLB_ROT_X); scene.add(groups.mesh);
    }
    const bg = buildBonesGroup(gltf.scene); nBones = bg.userData.nBones;
    groups.bones = wrapFixed(bg, center.clone(), scale, GLB_ROT_X); scene.add(groups.bones);
    applyVisibility(); applyLayout(); updateInfo();
  }, undefined, (e) => fail(key + ' glb error: ' + e.message));

  // splat .ply -> points
  loadSplatPoints(S.splat).then(pts => {
    if (tok !== loadToken) { return; }
    splatCount = pts.geometry.attributes.position.count;
    groups.splat = normalizedWrap(pts); scene.add(groups.splat);
    applyVisibility(); applyLayout(); updateInfo();
  }).catch(e => fail(key + ' splat error: ' + e.message));
}

function updateInfo() {
  info.textContent = `subject: ${SUBJECTS[current].label}  |  splat:${splatCount ? splatCount.toLocaleString() : '…'}  `
    + `mesh:${groups.mesh ? 'loaded' : '…'}  bones:${nBones || '…'}${nBones === 1 ? ' (degenerate — pre-cleanup)' : ''}`
    + `   |  drag=orbit, scroll=zoom`;
}

// ---- subject buttons ----
const subjBtns = { crab: 'sCrab', human: 'sHuman', butterfly: 'sButterfly' };
for (const [key, id] of Object.entries(subjBtns)) {
  document.getElementById(id).onclick = () => {
    for (const bid of Object.values(subjBtns)) document.getElementById(bid).classList.remove('on');
    document.getElementById(id).classList.add('on');
    loadSubject(key);
  };
}

// ---- show toggles ----
function tog(id, key, label) {
  const b = document.getElementById(id);
  b.onclick = () => { show[key] = !show[key]; if (groups[key]) groups[key].visible = show[key]; b.classList.toggle('on', show[key]); b.textContent = label + ': ' + (show[key] ? 'ON' : 'OFF'); };
}
tog('tSplat', 'splat', 'Splat'); tog('tMesh', 'mesh', 'Mesh'); tog('tBones', 'bones', 'Bones');
document.getElementById('tLayout').onclick = e => { layoutSideBySide = !layoutSideBySide; e.target.textContent = 'Layout: ' + (layoutSideBySide ? 'Side-by-side' : 'Combined'); e.target.classList.toggle('on', layoutSideBySide); applyLayout(); };

loadSubject('human');
(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
