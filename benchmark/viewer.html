<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>4dgs — splat / mesh / bones viewer</title>
<style>
  html,body{margin:0;height:100%;background:#0b0b10;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#eee}
  #ui{position:fixed;top:8px;left:8px;right:8px;z-index:10;font-size:13px;background:rgba(0,0,0,.55);padding:8px;border-radius:8px;backdrop-filter:blur(4px)}
  .row{display:flex;flex-wrap:wrap;gap:6px;margin:5px 0;align-items:center}
  button{background:#223;color:#cde;border:1px solid #456;border-radius:6px;padding:6px 10px;font-size:13px}
  button.on{background:#2a6;color:#001;border-color:#2a6}
  #err{color:#f77;white-space:pre-wrap}
  #info{color:#9ad}
</style>
</head>
<body>
<div id="ui">
  <div><b>splat / mesh / bones viewer</b> — toggle each output of the pipeline.</div>
  <div class="row">
    <button id="tSplat" class="on">Splat: ON</button>
    <button id="tMesh" class="on">Mesh: ON</button>
    <button id="tBones" class="on">Bones: ON</button>
    <button id="tLayout">Layout: Combined</button>
  </div>
  <div id="info">loading…</div>
  <div id="err"></div>
</div>
<script type="module">
const info = document.getElementById('info'), errEl = document.getElementById('err');
const fail = m => { errEl.textContent += m + "\n"; console.error(m); };
let THREE, GLTFLoader, OrbitControls;
try {
  THREE = await import('https://esm.sh/three@0.160.0');
  ({ GLTFLoader } = await import('https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js'));
  ({ OrbitControls } = await import('https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js'));
} catch (e) { fail('failed to load three.js: ' + e.message); throw e; }

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b10);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 0, 4);
const controls = new OrbitControls(camera, renderer.domElement);
scene.add(new THREE.HemisphereLight(0xffffff, 0x333344, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1.5); dir.position.set(2, 3, 2); scene.add(dir);
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// normalize an object/group to unit size centered at origin -> wrap in a group we can offset
function normalizedWrap(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const s = 1.6 / Math.max(size.x, size.y, size.z || 1e-3);
  const inner = new THREE.Group(); inner.add(obj);
  obj.position.sub(center); inner.scale.setScalar(s);
  const wrap = new THREE.Group(); wrap.add(inner);
  return wrap;
}

const groups = { splat: null, mesh: null, bones: null };
let layoutSideBySide = false;
function applyLayout() {
  const slot = { splat: -1.6, mesh: 0, bones: 1.6 };
  for (const k of ['splat', 'mesh', 'bones']) if (groups[k]) groups[k].position.x = layoutSideBySide ? slot[k] : 0;
}

// ---- load GLB (mesh + bones) ----
new GLTFLoader().load('assets/crab_rigged.glb', (gltf) => {
  const root = gltf.scene;
  // mesh
  let meshObj = null;
  root.traverse(o => { if (o.isMesh || o.isSkinnedMesh) { meshObj = o; o.material = new THREE.MeshStandardMaterial({ color: 0x9aa6b2, roughness: 0.8, metalness: 0.0, flatShading: false }); } });
  if (meshObj) { groups.mesh = normalizedWrap(root.clone(true)); scene.add(groups.mesh); }
  // bones via SkeletonHelper on a fresh clone (so scaling is independent)
  const boneRoot = gltf.scene.clone(true);
  const helper = new THREE.SkeletonHelper(boneRoot);
  helper.material.linewidth = 3;
  const bg = new THREE.Group(); bg.add(boneRoot); bg.add(helper);
  // hide the mesh inside boneRoot so only the helper lines show
  boneRoot.traverse(o => { if (o.isMesh || o.isSkinnedMesh) o.visible = false; });
  groups.bones = normalizedWrap(bg); scene.add(groups.bones);
  applyLayout(); updateInfo();
}, undefined, (e) => fail('glb load error: ' + e.message));

// ---- load splat .ply -> colored points ----
const SH_C0 = 0.28209479177387814;
async function loadSplatPoints(url) {
  const buf = await (await fetch(url)).arrayBuffer();
  const bytes = new Uint8Array(buf);
  const needle = 'end_header\n'; let he = -1;
  for (let i = 0; i < bytes.length - needle.length; i++) { let ok = true; for (let j = 0; j < needle.length; j++) if (bytes[i + j] !== needle.charCodeAt(j)) { ok = false; break; } if (ok) { he = i + needle.length; break; } }
  const header = new TextDecoder().decode(bytes.subarray(0, he));
  const le = header.includes('binary_little_endian');
  const TS = { float: 4, float32: 4, uchar: 1, uint8: 1, double: 8, int: 4, uint: 4, short: 2, ushort: 2 };
  let count = 0, props = [], off = 0;
  for (const line of header.split('\n')) { const t = line.trim().split(/\s+/); if (t[0] === 'element' && t[1] === 'vertex') count = +t[2]; else if (t[0] === 'property') { props.push({ name: t[2], type: t[1], off }); off += TS[t[1]] || 4; } }
  const stride = off, dv = new DataView(buf), pm = {}; props.forEach(p => pm[p.name] = p);
  const rd = (b, p) => p.type[0] === 'u' && p.type !== 'uint' && p.type !== 'ushort' ? dv.getUint8(b + p.off) : dv.getFloat32(b + p.off, le);
  const pos = new Float32Array(count * 3), col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) { const b = he + i * stride;
    pos[i*3] = dv.getFloat32(b + pm.x.off, le); pos[i*3+1] = dv.getFloat32(b + pm.y.off, le); pos[i*3+2] = dv.getFloat32(b + pm.z.off, le);
    let r, g, bl;
    if (pm.f_dc_0) { r = .5 + SH_C0 * dv.getFloat32(b + pm.f_dc_0.off, le); g = .5 + SH_C0 * dv.getFloat32(b + pm.f_dc_1.off, le); bl = .5 + SH_C0 * dv.getFloat32(b + pm.f_dc_2.off, le); }
    else if (pm.red) { r = dv.getUint8(b + pm.red.off)/255; g = dv.getUint8(b + pm.green.off)/255; bl = dv.getUint8(b + pm.blue.off)/255; }
    else r = g = bl = .7;
    col[i*3] = Math.min(1, Math.max(0, r)); col[i*3+1] = Math.min(1, Math.max(0, g)); col[i*3+2] = Math.min(1, Math.max(0, bl));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.01, vertexColors: true, sizeAttenuation: true }));
  return pts;
}
loadSplatPoints('assets/robot_crab_200k.ply').then(pts => { groups.splat = normalizedWrap(pts); scene.add(groups.splat); applyLayout(); updateInfo(); }).catch(e => fail('splat load error: ' + e.message));

function updateInfo() { info.textContent = `splat:${groups.splat ? 'loaded' : '…'}  mesh:${groups.mesh ? 'loaded' : '…'}  bones:${groups.bones ? 'loaded(1 bone — degenerate)' : '…'}   |  drag=orbit, scroll=zoom`; }

// ---- toggles ----
function tog(id, key, label) {
  const b = document.getElementById(id);
  b.onclick = () => { const g = groups[key]; if (!g) return; g.visible = !g.visible; b.classList.toggle('on', g.visible); b.textContent = label + ': ' + (g.visible ? 'ON' : 'OFF'); };
}
tog('tSplat', 'splat', 'Splat'); tog('tMesh', 'mesh', 'Mesh'); tog('tBones', 'bones', 'Bones');
document.getElementById('tLayout').onclick = e => { layoutSideBySide = !layoutSideBySide; e.target.textContent = 'Layout: ' + (layoutSideBySide ? 'Side-by-side' : 'Combined'); e.target.classList.toggle('on', layoutSideBySide); applyLayout(); };

(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
