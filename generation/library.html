<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4dgs library</title>
<style>
  body{margin:0;background:#0b0b10;color:#eee;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  header{position:sticky;top:0;background:rgba(11,11,16,.95);padding:12px 16px;border-bottom:1px solid #223;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  h1{font-size:16px;margin:0 12px 0 0}
  input{background:#181826;color:#eee;border:1px solid #345;border-radius:8px;padding:8px 12px;font-size:14px;flex:1;min-width:180px;max-width:420px}
  a.btn,button{background:#223;color:#cde;border:1px solid #456;border-radius:8px;padding:8px 12px;font-size:14px;text-decoration:none;cursor:pointer}
  button.go{background:#48f;color:#001;border-color:#48f}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:16px}
  .card{background:#14141c;border:1px solid #223;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .card img{width:100%;aspect-ratio:1;object-fit:cover;background:#fff}
  .card .meta{padding:8px;font-size:13px}
  .card .lab{font-weight:600}
  .card .sub{opacity:.6;font-size:12px}
  .card a{display:block;text-align:center;padding:8px;border-top:1px solid #223;color:#9cf;text-decoration:none}
  #empty{opacity:.6;padding:24px}
</style>
</head>
<body>
<header>
  <h1>4dgs library</h1>
  <input id="q" placeholder="search assets… (e.g. 'elephant', 'four legged animal', 'a person')">
  <button id="go" class="go">Search</button>
  <button id="all">Show all</button>
  <a class="btn" href="/">＋ Generate new</a>
</header>
<div id="grid"></div>
<div id="empty"></div>
<script>
const grid = document.getElementById('grid'), empty = document.getElementById('empty');
function render(assets, scored) {
  grid.innerHTML = ''; empty.textContent = assets.length ? '' : 'no assets — generate one to seed the library.';
  for (const a of assets) {
    const c = document.createElement('div'); c.className = 'card';
    const score = scored && a.score != null ? ` · ${(a.score).toFixed(2)}` : '';
    c.innerHTML = `<img src="${a.thumb || ''}" onerror="this.style.opacity=.2">
      <div class="meta"><div class="lab">${a.label || a.id}</div>
      <div class="sub">${a.category || '—'}${score}</div></div>
      <a href="/?asset=${encodeURIComponent(a.id)}">view ▸</a>`;
    grid.appendChild(c);
  }
}
async function load(url, scored) {
  const r = await (await fetch(url)).json();
  render(r.assets || [], scored);
}
document.getElementById('go').onclick = () => { const q = document.getElementById('q').value.trim(); load('/library/search?q=' + encodeURIComponent(q), !!q); };
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('go').click(); });
document.getElementById('all').onclick = () => { document.getElementById('q').value = ''; load('/library/list', false); };
load('/library/list', false);
</script>
</body>
</html>
